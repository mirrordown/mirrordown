catalog:
  vite: "npm:@voidzero-dev/vite-plus-core@latest"
  vite-plus: latest
  vitest: "npm:@voidzero-dev/vite-plus-test@latest"
  # Shared across all mdit-* packages and markdown-* extensions
  "@types/markdown-it": ^14.1.2
  markdown-it: ^14.0.0
  # Shared across all remd-* packages
  unified: ^11.0.0
  "@types/mdast": ^4.0.4
  "@types/hast": ^3.0.4
  unist-util-visit: ^5.1.0
  unist-builder: ^4.0.0
  unist-util-find-after: ^5.0.0
  unist-util-find-all-after: ^5.0.0
  unist-util-find-all-before: ^5.0.0
  unist-util-find-between-all: ^1.1.6
  mdast-util-from-markdown: ^2.0.3
  micromark-util-character: ^2.1.1
  micromark-util-types: ^2.0.2
  # Shared between mdit-inline-svg and remd-inline-svg
  svgo: ^4.0.1
  # Shared between mdit-slug and remd-slug (heading id generation parity)
  github-slugger: ^2.0.0
  # Shared between root and docs
  typescript: ^6.0.3

compressionLevel: mixed

enableGlobalCache: false

nodeLinker: node-modules

npmScopes:
  void-sdk:
    npmRegistryServer: "https://npm.pkg.github.com"

yarnPath: .yarn/releases/yarn-4.17.0.cjs
