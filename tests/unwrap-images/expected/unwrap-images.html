<!-- @case: block image -->
<img src="example.png" alt="alt text">

<!-- @case: block image with title -->
<img src="example.png" alt="alt text" title="a title">

<!-- @case: block image surrounded by paragraphs -->
<p>Paragraph before</p><img src="img.png" alt="alt"><p>Paragraph after</p>

<!-- @case: inline image within text -->
<p>Here is an inline <img src="img.png" alt="alt"> image.</p>

<!-- @case: plain text paragraph -->
<p>Just some text.</p>
