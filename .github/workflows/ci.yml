name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  ci:
    name: Check & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      - run: vp check
      # Runs the node "unit" project only — the browser-mode VRT project is
      # opt-in via VITEST_VRT (see vite.config.ts) and runs in its own workflow.
      - run: vp test
