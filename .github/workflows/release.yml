name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm and JSR OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      # Build the plugin packages first so the VSCode extensions can bundle
      # them. vp pack resolves @mirrordown/* deps to their dist; without a
      # built dist it silently externalizes the plugin and ships a broken vsix.
      - run: for d in packages/mdit-*/; do (cd "$d" && vp pack); done

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
