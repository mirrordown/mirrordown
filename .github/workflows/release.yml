name: Release

on:
  push:
    branches: [main]

jobs:
  release:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
      id-token: write # required for npm and JSR OIDC trusted publishing
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version: "24"
          cache: true

      # The VSCode extensions bundle the plugin source, so their build (vp pack)
      # needs the mdit-* dist present, otherwise vp pack silently externalizes
      # the plugin and ships a broken vsix. Build those dists only when an
      # extension will actually publish (its <name>@<version> tag is missing) —
      # a package-only release/retry skips this entirely.
      - name: Pre-build plugin dists for extension bundling
        run: |
          need=0
          for ext in extensions/*/; do
            [ -f "$ext/package.json" ] || continue
            nv=$(node -p "const p=require('./$ext/package.json'); p.name + '@' + p.version")
            git rev-parse -q --verify "refs/tags/$nv" >/dev/null || { need=1; break; }
          done
          if [ "$need" = 1 ]; then
            echo "An extension needs publishing — building plugin dists"
            for d in packages/mdit-*/; do (cd "$d" && vp pack); done
          else
            echo "No extension to publish — skipping plugin pre-build"
          fi

      - run: vp dlx @varlock/bumpy ci release
        env:
          GH_TOKEN: ${{ github.token }}
          BUMPY_GH_TOKEN: ${{ secrets.BUMPY_GH_TOKEN }}
          VSCE_PAT: ${{ secrets.VSCE_PAT }}
